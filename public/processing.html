<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка — Legal AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        h1 {
            font-size: 24px;
            color: #111827;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        .stages {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .stage-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e5e7eb;
        }
        .stage-dot.active { background: #667eea; }
        .stage-dot.completed { background: #10b981; }
        .stage-label {
            font-size: 12px;
            color: #9ca3af;
        }
        .actions {
            display: none;
        }
        .actions.visible {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        .btn-primary {
            background: #10b981;
            color: white;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" id="statusIcon">⚙️</div>
        
        <h1 id="title">Генерация документа...</h1>
        <p class="subtitle" id="subtitle">AI анализирует ваше дело</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="progress-text" id="progressText">0%</div>
        
        <div class="stages">
            <div class="stage">
                <div class="stage-dot active" id="stage1"></div>
                <div class="stage-label">Анализ</div>
            </div>
            <div class="stage">
                <div class="stage-dot" id="stage2"></div>
                <div class="stage-label">Генерация</div>
            </div>
            <div class="stage">
                <div class="stage-dot" id="stage3"></div>
                <div class="stage-label">Готово</div>
            </div>
        </div>
        
        <div class="actions" id="actions">
            <a href="#" class="btn btn-primary" id="downloadBtn">Скачать документ</a>
            <a href="/legal/" class="btn btn-secondary">Создать ещё</a>
        </div>
    </div>

    <script>
        const API_BASE = '/legal/api';
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('case_id');
        
        if (!caseId) {
            document.getElementById('title').textContent = 'Ошибка';
            document.getElementById('subtitle').textContent = 'Не указан ID дела';
            document.getElementById('statusIcon').textContent = '❌';
        } else {
            startProcessing();
        }
        
        async function startProcessing() {
            const token = localStorage.getItem('token');
            if (!token) {
                document.getElementById('subtitle').textContent = 'Ошибка авторизации';
                return;
            }
            
            // Start analysis
            try {
                await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({case_id: parseInt(caseId)})
                });
            } catch (e) {
                console.error('Start analysis error:', e);
            }
            
            // Poll progress
            pollProgress(token);
        }
        
        async function pollProgress(token) {
            const check = async () => {
                try {
                    const res = await fetch(`${API_BASE}/case/${caseId}/progress`, {
                        headers: {'Authorization': 'Bearer ' + token}
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        updateUI(data.data);
                        
                        if (data.data.is_completed) {
                            showDownload();
                        } else {
                            setTimeout(check, 2000);
                        }
                    }
                } catch (e) {
                    console.error('Poll error:', e);
                    setTimeout(check, 3000);
                }
            };
            
            check();
        }
        
        function updateUI(data) {
            const progress = data.progress || 0;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '%';
            
            if (data.progress_message) {
                document.getElementById('subtitle').textContent = data.progress_message;
            }
            
            // Update stages
            if (progress >= 30) {
                document.getElementById('stage1').classList.add('completed');
                document.getElementById('stage2').classList.add('active');
            }
            if (progress >= 70) {
                document.getElementById('stage2').classList.add('completed');
                document.getElementById('stage3').classList.add('active');
            }
        }
        
        function showDownload() {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressText').textContent = '100%';
            document.getElementById('stage3').classList.add('completed');
            document.getElementById('statusIcon').textContent = '✅';
            document.getElementById('title').textContent = 'Документ готов!';
            document.getElementById('subtitle').textContent = 'Можно скачать';
            
            const actions = document.getElementById('actions');
            actions.classList.add('visible');
            
            document.getElementById('downloadBtn').href = `${API_BASE}/download/${caseId}`;
            document.getElementById('downloadBtn').onclick = async (e) => {
                e.preventDefault();
                const token = localStorage.getItem('token');
                const res = await fetch(`${API_BASE}/download/${caseId}`, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `document_${caseId}.docx`;
                    a.click();
                }
            };
        }
    </script>
</body>
</html>
